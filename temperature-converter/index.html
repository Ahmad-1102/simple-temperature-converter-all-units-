<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <title>Temperature Converter</title>
    </head>
    <body>
        <input type="number" placeholder="Degrees" class="js-degrees-input degrees-input">
        <input placeholder="enter Unit from" class="js-unit-from-input unit-from-input">
        <input placeholder="enter Unit to" class="js-unit-to-input unit-to-input">
        <button class="convert-btn" onclick="
            convertTemperature()">Convert</button>
            <div class="result-css">
                <p class="js-result"></p>
            </div>
        <script src="script.js"></script>
    </body>
</html>
